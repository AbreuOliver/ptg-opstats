<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>NC OpStats sign-in code</title>
		<style>
			.table {
				display: table;
			}
		</style>
	</head>
	<body
		class="m-0 bg-neutral-100 p-0 font-sans text-neutral-900"
		style="
			margin: 0px;
			background-color: rgb(245, 245, 245);
			padding: 0px;
			font-family:
				ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji',
				'Segoe UI Symbol', 'Noto Color Emoji';
			color: rgb(23, 23, 23);
		"
	>
		<div
			class="hidden max-h-0 overflow-hidden opacity-0"
			style="display: none; max-height: 0px; overflow: hidden; opacity: 0"
		>
			Your NC OpStats sign-in code is [[OTP_CODE]].
		</div>
		<table
			role="presentation"
			class="w-full border-collapse border-0 bg-neutral-100"
			cellpadding="0"
			cellspacing="0"
			style="
				width: 100%;
				border-collapse: collapse;
				border-width: 0px;
				background-color: rgb(245, 245, 245);
			"
		>
			<tr>
				<td
					class="px-4 py-10"
					style="
						padding-left: 1rem;
						padding-right: 1rem;
						padding-top: 2.5rem;
						padding-bottom: 2.5rem;
					"
				>
					<table
						role="presentation"
						class="mx-auto w-full max-w-xl overflow-hidden rounded-xl border-2 border-solid border-neutral-200 bg-white shadow-sm"
						cellpadding="0"
						cellspacing="0"
						style="
							margin-left: auto;
							margin-right: auto;
							width: 100%;
							max-width: 36rem;
							overflow: hidden;
							border-radius: 0.75rem;
							border-width: 2px;
							border-style: solid;
							border-color: rgb(229, 229, 229);
							background-color: rgb(255, 255, 255);
							box-shadow:
								0 0 #0000,
								0 0 #0000,
								0 1px 2px 0 rgba(0, 0, 0, 0.05);
						"
					>
						<tr>
							<td
								class="bg-neutral-950 px-8 py-6 text-white"
								style="
									background-color: rgb(10, 10, 10);
									padding-left: 2rem;
									padding-right: 2rem;
									padding-top: 1.5rem;
									padding-bottom: 1.5rem;
									color: rgb(255, 255, 255);
								"
							>
								<div
									class="text-2xl font-bold tracking-tight"
									style="
										font-size: 1.5rem;
										line-height: 2rem;
										font-weight: 700;
										letter-spacing: -0.025em;
									"
								>
									NC OpStats
								</div>
								<div
									class="mt-1 text-sm text-neutral-300"
									style="
										margin-top: 0.25rem;
										font-size: 0.875rem;
										line-height: 1.25rem;
										color: rgb(212, 212, 212);
									"
								>
									Secure sign-in verification
								</div>
							</td>
						</tr>
						<tr>
							<td
								class="px-8 py-8"
								style="
									padding-left: 2rem;
									padding-right: 2rem;
									padding-top: 2rem;
									padding-bottom: 2rem;
								"
							>
								<h1
									class="m-0 text-2xl font-bold text-neutral-900"
									style="
										margin: 0px;
										font-size: 1.5rem;
										line-height: 2rem;
										font-weight: 700;
										color: rgb(23, 23, 23);
									"
								>
									Your sign-in code
								</h1>
								<p
									class="mt-4 mb-0 text-base leading-6 text-neutral-700"
									style="
										margin-bottom: 0px;
										margin-top: 1rem;
										font-size: 1rem;
										line-height: 1.5rem;
										color: rgb(64, 64, 64);
									"
								>
									Use this 6-digit code to finish signing in to NC OpStats.
								</p>
								<div
									class="my-8 rounded-xl border border-solid border-neutral-200 bg-neutral-100 px-6 py-5 text-center"
									style="
										margin-top: 2rem;
										margin-bottom: 2rem;
										border-radius: 0.75rem;
										border-width: 1px;
										border-style: solid;
										border-color: rgb(229, 229, 229);
										background-color: rgb(245, 245, 245);
										padding-left: 1.5rem;
										padding-right: 1.5rem;
										padding-top: 1.25rem;
										padding-bottom: 1.25rem;
										text-align: center;
									"
								>
									<div
										class="tracking-0_3em font-mono text-4xl font-bold"
										style="
											font-family:
												ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono',
												'Courier New', monospace;
											font-size: 2.25rem;
											line-height: 2.5rem;
											font-weight: 700;
											letter-spacing: 0.3em;
											color: #0f5645;
										"
									>
										[[OTP_CODE]]
									</div>
								</div>
								<p
									class="m-0 text-base leading-6 text-neutral-700"
									style="margin: 0px; font-size: 1rem; line-height: 1.5rem; color: rgb(64, 64, 64)"
								>
									This code expires in [[EXPIRES_MINUTES]] minutes.
								</p>
								<p
									class="mt-6 mb-0 text-sm leading-6 text-neutral-500"
									style="
										margin-bottom: 0px;
										margin-top: 1.5rem;
										font-size: 0.875rem;
										line-height: 1.5rem;
										color: rgb(115, 115, 115);
									"
								>
									If you did not request this, you can ignore this email.
								</p>
							</td>
						</tr>
					</table>
					<p
						class="mx-auto mt-6 max-w-xl text-center text-xs leading-5 text-neutral-500"
						style="
							margin-left: auto;
							margin-right: auto;
							margin-top: 1.5rem;
							max-width: 36rem;
							text-align: center;
							font-size: 0.75rem;
							line-height: 1.25rem;
							color: rgb(115, 115, 115);
						"
					>
						© NC OpStats
					</p>
				</td>
			</tr>
		</table>
	</body>
</html>
