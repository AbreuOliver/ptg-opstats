<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>NC OpStats sign-in code</title>
		<style>
			@tailwind utilities;
		</style>
	</head>
	<body class="m-0 bg-neutral-100 p-0 font-sans text-neutral-900">
		<div class="hidden max-h-0 overflow-hidden opacity-0">
			Your NC OpStats sign-in code is [[OTP_CODE]].
		</div>
		<table
			role="presentation"
			class="w-full border-collapse border-0 bg-neutral-100"
			cellpadding="0"
			cellspacing="0"
		>
			<tr>
				<td class="px-4 py-10">
					<table
						role="presentation"
						class="mx-auto w-full max-w-xl overflow-hidden rounded-xl border-2 border-solid border-neutral-200 bg-white shadow-sm"
						cellpadding="0"
						cellspacing="0"
					>
						<tr>
							<td class="bg-neutral-950 px-8 py-6 text-white">
								<div class="text-2xl font-bold tracking-tight">NC OpStats</div>
								<div class="mt-1 text-sm text-neutral-300">Secure sign-in verification</div>
							</td>
						</tr>
						<tr>
							<td class="px-8 py-8">
								<h1 class="m-0 text-2xl font-bold text-neutral-900">Your sign-in code</h1>
								<p class="mt-4 mb-0 text-base leading-6 text-neutral-700">
									Use this 6-digit code to finish signing in to NC OpStats.
								</p>
								<div
									class="my-8 rounded-xl border border-solid border-neutral-200 bg-neutral-100 px-6 py-5 text-center"
								>
									<div class="font-mono text-4xl font-bold tracking-[0.3em]" style="color: #0f5645">
										[[OTP_CODE]]
									</div>
								</div>
								<p class="m-0 text-base leading-6 text-neutral-700">
									This code expires in [[EXPIRES_MINUTES]] minutes.
								</p>
								<p class="mt-6 mb-0 text-sm leading-6 text-neutral-500">
									If you did not request this, you can ignore this email.
								</p>
							</td>
						</tr>
					</table>
					<p class="mx-auto mt-6 max-w-xl text-center text-xs leading-5 text-neutral-500">
						© NC OpStats
					</p>
				</td>
			</tr>
		</table>
	</body>
</html>
